# docker-compose.yml — ether-ocr REST API + MCP services
#
# Usage:
#   docker compose up -d      # Start API + MCP
#   docker compose down        # Stop services
#   docker compose logs -f     # View logs
#
# Environment variables (see .env.example):
#   AUTH_ENABLED=1            # Enable authentication (1|0)
#   API_KEYS=key1,key2        # Comma-separated valid API keys
#   JWT_SECRET=secret         # Secret for JWT verification
#   CORS_ORIGINS=origins      # Comma-separated allowed origins
#   MAX_UPLOAD_BYTES=52428800 # Max upload size in bytes (50 MB)
#   RATE_LIMIT_REQUESTS=30    # Max requests per IP per window
#   MCP_TRANSPORT=http        # MCP transport: stdio | http
#   MCP_PORT=9001             # MCP HTTP port

services:
  ether-ocr:
    build:
      context: ..
      dockerfile: containers/Dockerfile
    image: ether-ocr:latest
    container_name: ether-ocr-api
    ports:
      - "${PORT:-8000}:8000"
      - "${MCP_PORT:-9001}:9001"
    volumes:
      - ./data/input:/data/input:ro
      - ./data/output:/data/output
    environment:
      - PYTHONPATH=/workspace/python/ether-api-ocr/src:/workspace/python/ether-core-ocr/src
      - TESSDATA_PREFIX=/usr/share/tesseract-ocr/5/tessdata
      # Auth
      - AUTH_ENABLED=${AUTH_ENABLED:-1}
      - API_KEYS=${API_KEYS:-dev-key-ether-ocr}
      - JWT_SECRET=${JWT_SECRET:-}
      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8000}
      # Server
      - HOST=0.0.0.0
      - PORT=8000
      # Security
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-52428800}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-1}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-30}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      # OCR
      - OCR_DEFAULT_LANG=${OCR_DEFAULT_LANG:-spa+eng}
      - OCR_DEFAULT_DPI=${OCR_DEFAULT_DPI:-300}
      - OCR_MAX_INLINE_BYTES=${OCR_MAX_INLINE_BYTES:-102400}
      # MCP
      - MCP_TRANSPORT=${MCP_TRANSPORT:-http}
      - MCP_PORT=${MCP_PORT:-9001}
    working_dir: /workspace
    command: ["bash", "scripts/shellscript/entrypoint.sh"]
    restart: unless-stopped
